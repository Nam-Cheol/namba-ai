name: Codex Review Request

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write

jobs:
  request-review:
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.base.ref == 'main' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- namba-codex-review-request -->";
            const body = `${marker}\n@codex review`;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            if (comments.some((comment) => comment.body && comment.body.includes(marker))) {
              core.info("Codex review request comment already exists.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
