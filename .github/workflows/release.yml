name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: 386
            asset_name: namba_Windows_x86.zip
            binary_name: namba.exe
          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset_name: namba_Windows_x86_64.zip
            binary_name: namba.exe
          - runner: windows-latest
            goos: windows
            goarch: arm64
            asset_name: namba_Windows_arm64.zip
            binary_name: namba.exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: namba_Linux_x86_64.tar.gz
            binary_name: namba
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: namba_Linux_arm64.tar.gz
            binary_name: namba
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: namba_macOS_x86_64.tar.gz
            binary_name: namba
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: namba_macOS_arm64.tar.gz
            binary_name: namba

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          version="dev"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          fi
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X github.com/Nam-Cheol/namba-ai/internal/namba.cliVersion=${version}" -o "dist/${{ matrix.binary_name }}" ./cmd/namba

      - name: Package archive on Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Package archive on Unix
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          tar -C dist -czf "dist/${{ matrix.asset_name }}" "${{ matrix.binary_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: .namba/releases/${{ github.ref_name }}.md
          files: |
            release/*
