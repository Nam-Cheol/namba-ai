name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
      - name: Run vet
        run: go vet ./...
      - name: Check formatting
        run: |
          out="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          test -z "$out" || { printf '%s\n' "$out"; exit 1; }
